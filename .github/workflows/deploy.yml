name: Build & Deploy to Clever Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push dist to deploy branch
        run: |
          cd dist
          git init
          git config user.email "deploy@github-actions"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/izybiz/Website.git HEAD:deploy
