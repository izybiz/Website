name: Build & Deploy to Clever Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLEVER_SSH_KEY }}

      - name: Add Clever Cloud to known hosts
        run: ssh-keyscan push.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Push dist to Clever Cloud
        run: |
          git config --global user.email "deploy@github-actions"
          git config --global user.name "GitHub Actions"
          cd dist
          git init
          git add -A
          git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force git+ssh://git@push.clever-cloud.com/app_ae47ccdf-ff2b-48cd-994c-137e9693ebc8.git HEAD:master
